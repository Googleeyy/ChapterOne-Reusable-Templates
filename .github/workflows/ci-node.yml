name: Node.js CI Pipeline

on:
  push:
    branches: [dev, production]
  pull_request:
    branches: [dev, production]
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker Hub image name'
        required: true
        type: string
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      working_directory:
        description: 'Working directory'
        required: false
        type: string
        default: '.'
      production_branch:
        description: 'Production branch name'
        required: false
        type: string
        default: 'production'
      dev_branch:
        description: 'Dev branch name'
        required: false
        type: string
        default: 'dev'

env:
  IMAGE_NAME: ${{ github.event.inputs.image_name || vars.IMAGE_NAME || 'my-org/node-service' }}
  NODE_VERSION: ${{ github.event.inputs.node_version || vars.NODE_VERSION || '20' }}
  WORKING_DIRECTORY: ${{ github.event.inputs.working_directory || vars.WORKING_DIRECTORY || '.' }}
  PRODUCTION_BRANCH: ${{ github.event.inputs.production_branch || vars.PRODUCTION_BRANCH || 'production' }}
  DEV_BRANCH: ${{ github.event.inputs.dev_branch || vars.DEV_BRANCH || 'dev' }}

jobs:

  # ─────────────────────────────────────────────
  # PREPARE — Resolve Docker image tag based on branch + commit
  # ─────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      push: ${{ steps.tag.outputs.push }}
      is_production: ${{ steps.tag.outputs.is_production }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Resolve Tag Strategy ───────────────────
      - name: Resolve Tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == "${{ env.PRODUCTION_BRANCH }}" ]]; then
            # Production: Semver bump based on commit message
            # Find latest semver tag (default v0.0.0)
            latest_tag=$(git tag -l 'v*.*.*' | sort -V | tail -n 1)
            if [[ -z "$latest_tag" ]]; then
              latest_tag="v0.0.0"
            fi
            echo "Latest tag: $latest_tag"

            # Parse version components
            version=${latest_tag#v}
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)

            # Read commit message and determine bump type
            commit_msg=$(git log -1 --pretty=%B)
            echo "Commit message: $commit_msg"

            if [[ "$commit_msg" == BREAKING
git CHANGE:* ]]; then
              # Major bump
              major=$((major + 1))
              minor=0
              patch=0
            elif [[ "$commit_msg" == feat:* ]]; then
              # Minor bump
              minor=$((minor + 1))
              patch=0
            else
              # Patch bump (fix:, chore:, etc.)
              patch=$((patch + 1))
            fi

            new_tag="v${major}.${minor}.${patch}"
            echo "tag=$new_tag" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
            echo "is_production=true" >> $GITHUB_OUTPUT
            echo "New production tag: $new_tag"
          else
            # Dev branch: dev-<short sha>
            short_sha="${GITHUB_SHA::7}"
            echo "tag=dev-${short_sha}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
            echo "is_production=false" >> $GITHUB_OUTPUT
            echo "New dev tag: dev-${short_sha}"
          fi

      # ── Job Summary ────────────────────────────
      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📋 Prepare Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | ${{ steps.tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Push** | ${{ steps.tag.outputs.push }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Is Production** | ${{ steps.tag.outputs.is_production }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | ${GITHUB_SHA::7} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # TEST — Run unit tests inline
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm test

  # ─────────────────────────────────────────────
  # SONAR — Reusable SonarQube scan
  # ─────────────────────────────────────────────
  sonar:
    name: SonarQube Scan
    needs: test
    uses: YOUR_ORG/ci-workflows/.github/workflows/_sonar.yml@main
    with:
      runtime: node
      working_directory: ${{ env.WORKING_DIRECTORY }}
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY || '' }}
      node_version: ${{ env.NODE_VERSION }}
    secrets: inherit

  # ─────────────────────────────────────────────
  # SNYK — Reusable Snyk vulnerability scan
  # ─────────────────────────────────────────────
  snyk:
    name: Snyk Security Scan
    needs: test
    uses: YOUR_ORG/ci-workflows/.github/workflows/_snyk.yml@main
    with:
      runtime: node
      working_directory: ${{ env.WORKING_DIRECTORY }}
      node_version: ${{ env.NODE_VERSION }}
      severity_threshold: ${{ vars.SNYK_SEVERITY || 'high' }}
    secrets: inherit

  # ─────────────────────────────────────────────
  # BUILD + TRIVY — Build Docker image and scan
  # ─────────────────────────────────────────────
  build_trivy:
    name: Build & Trivy Scan
    needs: [sonar, snyk]
    uses: YOUR_ORG/ci-workflows/.github/workflows/_build_trivy.yml@main
    with:
      runtime: node
      image_name: ${{ env.IMAGE_NAME }}
      tag: ${{ needs.prepare.outputs.tag }}
      is_production: ${{ needs.prepare.outputs.is_production }}
      working_directory: ${{ env.WORKING_DIRECTORY }}
      docker_context: '.'
      dockerfile_path: 'Dockerfile'
      node_version: ${{ env.NODE_VERSION }}
      trivy_severity: ${{ vars.TRIVY_SEVERITY || 'CRITICAL,HIGH' }}
      trivy_ignore_unfixed: ${{ vars.TRIVY_IGNORE_UNFIXED || 'false' }}
    secrets: inherit

  # ─────────────────────────────────────────────
  # PUSH — Push image to Docker Hub
  # ─────────────────────────────────────────────
  push:
    name: Push to Registry
    needs: build_trivy
    if: needs.prepare.outputs.push == 'true'
    uses: YOUR_ORG/ci-workflows/.github/workflows/_push.yml@main
    with:
      image_name: ${{ env.IMAGE_NAME }}
      tag: ${{ needs.prepare.outputs.tag }}
      is_production: ${{ needs.prepare.outputs.is_production }}
      push_dev_images: ${{ vars.PUSH_DEV_IMAGES || 'false' }}
    secrets: inherit

  # ─────────────────────────────────────────────
  # NOTIFY — Send email notification
  # ─────────────────────────────────────────────
  notify:
    name: Email Notification
    needs: [sonar, snyk, build_trivy, push]
    if: always()
    uses: YOUR_ORG/ci-workflows/.github/workflows/_notify.yml@main
    with:
      service_name: ${{ env.IMAGE_NAME }}
      tag: ${{ needs.prepare.outputs.tag }}
      pipeline_status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
    secrets: inherit

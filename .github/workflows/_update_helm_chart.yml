name: Reusable Update Helm Chart

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Name of the microservice (e.g., book-service, user-service, frontend)"
      image-tag:
        required: true
        type: string
        description: "Docker image tag to deploy (e.g., v1.0.5)"
      environment:
        required: true
        type: string
        description: "Environment branch (dev or production)"
      helm-repo:
        required: false
        type: string
        default: "Googleeyy/ChapterOne-Helm"
        description: "Helm chart repository"
      values-path:
        required: false
        type: string
        default: "microservices"
        description: "Path to microservices values files in Helm repo"
      require-approval:
        required: false
        type: boolean
        default: false
        description: "Set to true to require manual approval before updating Helm chart (use for production deployments)"
    secrets:
      HELM_REPO_PAT:
        required: true
        description: "Personal Access Token with write access to Helm repository"

jobs:
  approve:
    name: "Approval Gate"
    runs-on: ubuntu-latest
    if: inputs.require-approval == true
    environment: ${{ inputs.environment }}
    outputs:
      approved-by: ${{ github.actor }}
    steps:
      - name: Await Approval
        run: |
          echo "✅ ${{ inputs.environment }} deployment approved by reviewer."
          echo ""
          echo "## 🔒 Production Approval Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ inputs.service-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ inputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Approved By** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Approved At** | $(date -u) |" >> $GITHUB_STEP_SUMMARY

  update-chart:
    name: "CD: Update ${{ inputs.service-name }} Helm Chart"
    runs-on: ubuntu-latest
    needs: approve
    if: always() && (needs.approve.result == 'success' || needs.approve.result == 'skipped')
    steps:
      - name: Checkout Helm Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm-repo }}
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-charts
          ref: ${{ inputs.environment }}

      - name: Setup yq
        uses: mikefarah/yq@v4.44.1

      - name: Update image tag
        run: |
          if [ "${{ inputs.environment }}" == "dev" ]; then
            FILE="helm-charts/values-dev.yaml"
          else
            FILE="helm-charts/values-prod.yaml"
          fi
          
          if [ -f "$FILE" ]; then
            echo "Updating $FILE with tag ${{ inputs.image-tag }}"
            
            # Convert kebab-case to camelCase (e.g., book-service → bookService)
            SERVICE_KEY=$(echo "${{ inputs.service-name }}" | sed 's/-\([a-z]\)/\U\1/g')
            
            # Update the tag in the parent values file
            yq -i ".${SERVICE_KEY}.image.tag = \"${{ inputs.image-tag }}\"" "$FILE"
            echo "Updated tag successfully"
            yq ".${SERVICE_KEY}.image" "$FILE"
          else
            echo "::error::File not found: $FILE"
            exit 1
          fi

      - name: Validate values.yaml
        run: |
          # Ensure the YAML is still valid after modification
          if [ "${{ inputs.environment }}" == "dev" ]; then
            yq eval '.' "helm-charts/values-dev.yaml" > /dev/null
          else
            yq eval '.' "helm-charts/values-prod.yaml" > /dev/null
          fi
          echo "YAML validation passed"

      - name: Commit and Push changes
        run: |
          cd helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote set-url origin https://${{ secrets.HELM_REPO_PAT }}@github.com/${{ inputs.helm-repo }}.git
          
          if [ "${{ inputs.environment }}" == "dev" ]; then
            git add values-dev.yaml
          else
            git add values-prod.yaml
          fi
          
          if git diff --staged --quiet; then
            echo "No changes detected (tag might already be up to date)"
          else
            if [ "${{ needs.approve.result }}" == "success" ]; then
              git commit -m "cd: update ${{ inputs.service-name }} image tag to ${{ inputs.image-tag }} [${{ inputs.environment }}] (approved by @${{ needs.approve.outputs.approved-by }})"
            else
              git commit -m "cd: update ${{ inputs.service-name }} image tag to ${{ inputs.image-tag }} [${{ inputs.environment }}]"
            fi
            git push origin ${{ inputs.environment }}
            echo "Successfully pushed changes to ${{ inputs.environment }} branch"
          fi

      - name: Job Summary
        if: always()
        run: |
          echo "## 📦 Helm Chart Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ inputs.service-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ inputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Helm Repository** | ${{ inputs.helm-repo }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Approval Required** | ${{ inputs.require-approval }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.approve.result }}" == "success" ]; then
            echo "| **Approved By** | @${{ needs.approve.outputs.approved-by }} |" >> $GITHUB_STEP_SUMMARY
          fi

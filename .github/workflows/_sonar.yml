name: Reusable SonarQube Scan

on:
  workflow_call:
    inputs:
      service-path:
        required: false
        type: string
        default: '.'
      runtime:
        required: true
        type: string
      sonar_project_key:
        required: false
        type: string
        default: ''
      java_version:
        required: false
        type: string
        default: '21'
      node_version:
        required: false
        type: string
        default: '20'
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: false

jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java Runtime Setup ─────────────────────
      - name: Setup Java
        if: inputs.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: SonarQube Scan (Java)
        if: inputs.runtime == 'java'
        working-directory: ${{ inputs.service-path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [[ -n "${{ inputs.sonar_project_key }}" ]]; then
            mvn verify sonar:sonar --batch-mode -DskipTests -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          else
            mvn verify sonar:sonar --batch-mode -DskipTests
          fi

      # ── Node Runtime Setup ─────────────────────
      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        if: inputs.runtime == 'node'
        working-directory: ${{ inputs.service-path }}
        run: npm install

      - name: Run SonarQube Scan
        if: inputs.runtime == 'node'
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.service-path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── Sonar Quality Gate Check ─────────────────────
      - name: SonarQube Quality Gate
        id: gate
        if: inputs.runtime == 'java'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ inputs.service-path }}/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set Gate Output
        id: set_gate
        if: always()
        run: |
          echo "status=${{ steps.gate.outcome }}" >> $GITHUB_OUTPUT

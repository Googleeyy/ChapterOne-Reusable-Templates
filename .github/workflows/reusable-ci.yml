name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      service_name:
        required: true
        type: string
      sonar_project_key:
        required: false
        type: string
        default: ''
      docker_context:
        required: false
        type: string
        default: '.'
      dockerfile_path:
        required: false
        type: string
        default: 'Dockerfile'
      dev_branch:
        required: false
        type: string
        default: 'dev'
      production_branch:
        required: false
        type: string
        default: 'production'
      manual_version:
        required: false
        type: string
        default: ''

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: false
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      EMAIL_TO:
        required: false

env:
  DOCKER_REGISTRY: docker.io

jobs:

# ─────────────────────────────────────────────
# PREPARE
# ─────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      push: ${{ steps.tag.outputs.push }}
      is_production: ${{ steps.tag.outputs.is_production }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == "${{ inputs.production_branch }}" ]]; then
            echo "tag=prod-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
            echo "is_production=true" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
            echo "is_production=false" >> $GITHUB_OUTPUT
          fi

# ─────────────────────────────────────────────
# TEST
# ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - run: mvn test

# ─────────────────────────────────────────────
# SONAR
# ─────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.working_directory }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# ─────────────────────────────────────────────
# SNYK
# ─────────────────────────────────────────────
  snyk:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/maven@0.4.0
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

# ─────────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk]

    steps:
      - uses: actions/checkout@v4

      - name: Build Jar
        run: mvn package -DskipTests

      - name: Docker Build
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ needs.prepare.outputs.tag }} .

      - name: Save Image
        run: docker save -o image.tar ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ needs.prepare.outputs.tag }}

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar

# ─────────────────────────────────────────────
# TRIVY
# ─────────────────────────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - run: docker load -i image.tar

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ needs.prepare.outputs.tag }}
          exit-code: 1
          severity: CRITICAL,HIGH

# ─────────────────────────────────────────────
# PUSH
# ─────────────────────────────────────────────
  push:
    runs-on: ubuntu-latest
    needs: [prepare, trivy]
    if: needs.prepare.outputs.push == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - run: docker load -i image.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ needs.prepare.outputs.tag }}

# ─────────────────────────────────────────────
# NOTIFY (FIXED 🔥)
# ─────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk, build, trivy, push]
    if: ${{ always() }}

    steps:
      - name: Check Email Enabled
        id: email
        run: |
          if [ -n "${{ secrets.SMTP_HOST }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Success Mail
        if: ${{ steps.email.outputs.enabled == 'true' && success() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Failure Mail
        if: ${{ steps.email.outputs.enabled == 'true' && failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
